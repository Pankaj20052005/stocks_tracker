<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Stock Price Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Real-time Stock Prices</h1>
        <div class="stock-form">
            <input type="text" id="stockSymbol" placeholder="Enter stock symbol (.BSE)">
            <button id="getPrice">Get Price</button>
        </div>
        <div class="stock-info">
            <h2 id="companyName">Company: N/A</h2>
            <p id="stockPrice">Price: N/A</p>
            <p id="stockChange">Change: N/A</p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
